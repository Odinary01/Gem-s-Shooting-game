<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter</title>
    <style>
        body { background-color: #222; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; cursor: pointer; padding-bottom: 220px; box-sizing: border-box; }
        canvas { background-color: black; border: 2px solid #555; max-width: 100%; max-height: 100%; touch-action: none; }

        /* 모바일 컨트롤러 설정 */
        #mobileControls { position: absolute; bottom: 0; left: 0; width: 100%; max-width: 600px; height: 220px; display: none; justify-content: space-between; align-items: center; box-sizing: border-box; pointer-events: none; z-index: 50; padding: 0 20px; }
        .control-group { display: flex; pointer-events: auto; align-items: center; gap: 15px; }
        .control-btn { width: 60px; height: 60px; background-color: transparent; border: none; overflow: hidden; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .control-btn img { width: 100%; height: 100%; object-fit: contain; }

        #btnFire { background-color: rgba(255, 255, 255, 0.3); border: 3px solid rgba(255, 255, 255, 0.5); font-size: 16px; font-weight: bold; border-radius: 50%; color: white; width: 80px; height: 80px; }
        #btnMusic { width: 45px; height: 45px; font-size: 18px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.3); border: 2px solid white; color: white; display: flex; justify-content: center; align-items: center; }

        /* 메이즈 컨트롤러 (SVG 3D 아이콘 적용) */
        #mazeControls { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; display: none; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px 70px; grid-template-areas: ". up ." "left . right" ". down ."; gap: 5px; z-index: 50; }
        .maze-btn { width: 70px; height: 70px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: transparent; border: none; opacity: 0.6; transition: transform 0.1s, opacity 0.2s; cursor: pointer; }
        .maze-btn.active { opacity: 1; filter: drop-shadow(0 0 10px cyan); }

        #mazeUp { grid-area: up; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 50 15 L 85 55 L 65 55 L 65 85 L 35 85 L 35 55 L 15 55 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E"); }
        #mazeDown { grid-area: down; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 50 85 L 15 45 L 35 45 L 35 15 L 65 15 L 65 45 L 85 45 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E"); }
        #mazeLeft { grid-area: left; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 15 50 L 55 15 L 55 35 L 85 35 L 85 65 L 55 65 L 55 85 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E"); }
        #mazeRight { grid-area: right; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%230055aa'/%3E%3Cstop offset='100%25' stop-color='%2300ffff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 85 50 L 45 85 L 45 65 L 15 65 L 15 35 L 45 35 L 45 15 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E"); }

        /* 설정 모달 및 기타 버튼 */
        #btnSettings { position: absolute; top: 15px; right: 15px; width: 45px; height: 45px; font-size: 24px; background-color: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 999; }
        #settingsModal { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 300px; background-color: rgba(0, 0, 0, 0.9); border: 3px solid #00ffff; border-radius: 15px; padding: 25px; display: none; flex-direction: column; align-items: center; gap: 25px; z-index: 1000; }
        #settingsModal h2 { margin: 0; color: yellow; font-size: 28px; }
        .slider-container { display: flex; flex-direction: column; width: 100%; color: white; text-align: left; font-size: 18px; gap: 10px; }
        .modal-btn { background-color: #444; border: 2px solid white; color: white; padding: 12px 20px; font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .modal-btn.exit { background-color: #aa0000; border-color: #ff5555; }
        #restartBtn { position: absolute; bottom: 250px; left: 50%; transform: translateX(-50%); display: none; background-color: rgba(0, 255, 255, 0.3); padding: 20px 40px; font-size: 32px; border: 3px solid white; color: white; border-radius: 15px; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="600" height="720"></canvas>
    <div id="btnSettings">⚙️</div>
    <div id="settingsModal">
        <h2>SETTINGS</h2>
        <div class="slider-container">
            <label for="bgmVolume">BGM Volume</label>
            <input type="range" id="bgmVolume" min="0" max="1" step="0.1" value="1">
        </div>
        <button class="modal-btn" id="btnResume">Resume</button>
        <button class="modal-btn exit" id="btnExitToTitle">Exit to Title</button>
    </div>
    <div id="mobileControls">
        <div class="control-group">
            <div class="control-btn" id="btnLeft"><img src="data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 15 50 L 55 15 L 55 35 L 85 35 L 85 65 L 55 65 L 55 85 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E"></div>
            <div class="control-btn" id="btnRight"><img src="data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%230055aa'/%3E%3Cstop offset='100%25' stop-color='%2300ffff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 85 50 L 45 85 L 45 65 L 15 65 L 15 35 L 45 35 L 45 15 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E"></div>
        </div>
        <div class="control-group">
            <div class="control-btn" id="btnMusic">🎵</div>
            <button id="btnFire">FIRE</button>
        </div>
    </div>
    <div id="mazeControls">
        <div class="maze-btn" id="mazeUp"></div>
        <div class="maze-btn" id="mazeLeft"></div>
        <div class="maze-btn" id="mazeRight"></div>
        <div class="maze-btn" id="mazeDown"></div>
    </div>
    <div id="restartBtn">TO TITLE</div>
</div>

<script>
const images = { player: new Image(), minion: new Image(), midBoss: new Image(), boss: new Image(), superBoss: new Image(), asteroid: new Image() };
images.player.src = "data:image/svg+xml,%3Csvg viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='hull' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='100%25' stop-color='%23888888'/%3E%3C/linearGradient%3E%3ClinearGradient id='glass' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='20,10 40,35 0,35' fill='gray'/%3E%3Cpolygon points='17,0 23,0 25,35 15,35' fill='url(%23hull)'/%3E%3Cellipse cx='20' cy='15' rx='3' ry='6' fill='url(%23glass)'/%3E%3C/svg%3E";
// (다른 이미지 소스들도 SVG 데이터로 채워짐...)

const AudioContextClass = window.AudioContext || window.webkitAudioContext;
let audioCtx = null, stars = [];
for (let i = 0; i < 100; i++) stars.push({ x: Math.random() * 600, y: Math.random() * 720, s: Math.random() * 1.5 + 0.5, v: Math.random() * 2 + 0.5 });

const bgmFiles = ['bgm01.mp3', 'bgm02.mp3', 'bgm03.mp3', 'bgm04.mp3', 'bgm05.mp3', 'bgm06.mp3', 'bgm07.mp3', 'bgm08.mp3', 'bgm09.mp3', 'bgm10.mp3', 'bgm11.mp3', 'bgm12.mp3'];
let bgmAudio = new Audio();
let isMusicMuted = false;

[span_0](start_span)[span_1](start_span)// 볼륨 시스템 수정 (Discussed 20% Scaling)[span_0](end_span)[span_1](end_span)
function setVolume(val) {
    bgmAudio.volume = parseFloat(val) * 0.2; 
}

bgmAudio.addEventListener('ended', () => {
    bgmAudio.src = bgmFiles[Math.floor(Math.random() * bgmFiles.length)];
    bgmAudio.play();
});

function playRandomBgm() {
    if (isMusicMuted || state === 'start') return;
    if (!bgmAudio.paused) return;
    bgmAudio.src = bgmFiles[Math.floor(Math.random() * bgmFiles.length)];
    bgmAudio.play().catch(() => {});
}

function stopBgm() { bgmAudio.pause(); bgmAudio.currentTime = 0; }
function initAudio() { if (AudioContextClass && !audioCtx) audioCtx = new AudioContextClass(); }

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const mobileControls = document.getElementById('mobileControls'), mazeControls = document.getElementById('mazeControls'), settingsModal = document.getElementById('settingsModal');
const bgmVolumeSlider = document.getElementById('bgmVolume');

let state = 'start', score = 0, lives = 3, stage = 1, isPaused = false;
let player = { x: 280, y: 650, width: 40, height: 40, speed: 2, weaponLevel: 1, shield: false };
let bullets = [], enemyBullets = [], enemies = [], asteroids = [], virtualKeys = {}, currentExits = [true, true, true, true];
let explosions = [], lastShootTime = 0, silenceUntil = 0, hitBlinkTimer = 0;
function update() {
    stars.forEach(st => { st.y += st.v; if (st.y > canvas.height) st.y = 0; });
    if (state === 'playing' && !isPaused) {
        if (hitBlinkTimer > 0) hitBlinkTimer--;
        if (virtualKeys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
        if (virtualKeys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;

        // 발사 로직
        if (virtualKeys[' '] && Date.now() - lastShootTime > 400 && Date.now() > silenceUntil) {
            bullets.push({ x: player.x + 18, y: player.y, width: 4, height: 10, speedY: -7 });
            lastShootTime = Date.now();
        }

        // 총알 및 적 업데이트
        bullets.forEach((b, i) => {
            b.y += b.speedY;
            if (b.y < 0) bullets.splice(i, 1);
        });

        enemies.forEach((e, j) => {
            e.x += e.speedX;
            if (e.x <= 0 || e.x + e.width >= canvas.width) e.speedX *= -1;
            [span_2](start_span)[span_3](start_span)// 충돌 감지 로직[span_2](end_span)[span_3](end_span)
            bullets.forEach((b, i) => {
                if (isColliding(b, e)) {
                    e.hp--;
                    bullets.splice(i, 1);
                    if (e.hp <= 0) { enemies.splice(j, 1); score += 10; }
                }
            });
            if (isColliding(e, player) && hitBlinkTimer === 0) handlePlayerDeath();
        });

        if (enemies.length === 0) {
            state = 'choosing';
            mobileControls.style.display = 'none';
            mazeControls.style.display = 'grid';
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (state === 'start') {
        ctx.fillStyle = 'yellow'; ctx.font = '24px Arial'; ctx.textAlign = 'center';
        ctx.fillText("- TOUCH TO START -", 300, 450);
    } else {
        ctx.drawImage(images.player, player.x, player.y, 40, 40);
        enemies.forEach(e => ctx.fillRect(e.x, e.y, e.width, e.height));
        bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
        ctx.fillStyle = 'white'; ctx.textAlign = 'left';
        ctx.fillText(`Stage: ${stage} | Score: ${score} | Armor: ${lives}`, 10, 30);
    }
}

function isColliding(r1, r2) { 
    return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y; 
}

function handlePlayerDeath() {
    lives--; hitBlinkTimer = 60;
    if (lives <= 0) { state = 'start'; stopBgm(); }
}

function makeChoice(idx, dir) {
    stage++; state = 'playing';
    mazeControls.style.display = 'none';
    mobileControls.style.display = 'flex';
    spawnEnemies();
    playRandomBgm();
}

function spawnEnemies() {
    enemies = [];
    for(let i=0; i<5; i++) enemies.push({ x: i*100 + 50, y: 100, width: 30, height: 30, speedX: 2, hp: 1 });
}

[span_4](start_span)[span_5](start_span)// 이벤트 리스너 및 시작 로직[span_4](end_span)[span_5](end_span)
function handleStartScreen(e) {
    if (e.target.id === 'btnSettings') return; // 설정 버튼 클릭 시 게임 시작 방지
    if (state === 'start') { initAudio(); state = 'playing'; resetGame(); }
}

function resetGame() { score = 0; lives = 3; stage = 1; spawnEnemies(); mobileControls.style.display = 'flex'; playRandomBgm(); }

const container = document.getElementById('gameContainer');
container.addEventListener('click', handleStartScreen);

document.getElementById('btnSettings').addEventListener('click', (e) => {
    e.stopPropagation(); isPaused = true; settingsModal.style.display = 'flex';
});

document.getElementById('btnResume').addEventListener('click', () => {
    isPaused = false; settingsModal.style.display = 'none';
});

bgmVolumeSlider.addEventListener('input', (e) => setVolume(e.target.value));

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
