    <style>
        body { background-color: #222; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #gameContainer { position: relative; width: 100%; max-width: 576px; height: 100dvh; margin: 0 auto; background-color: #222; overflow: hidden; cursor: pointer; }
         canvas { display: block; width: 100%; height: calc(100% - 160px); background-color: black; touch-action: none; border-bottom: 2px solid #555; }

        /* 모바일 컨트롤러: 투명 배경 및 배치 최적화 */
        #mobileControls { position: absolute; bottom: 0; left: 0; width: 100%; max-width: 600px; height: 160px; display: none; justify-content: space-between; align-items: center; box-sizing: border-box; pointer-events: none; z-index: 50; padding: 0 20px; }
.control-group { 
    display: flex; 
    pointer-events: auto; 
    align-items: center; 
}

.control-btn { 
    width: 60px; 
    height: 60px; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    background-color: transparent; 
    border: none; 
    cursor: pointer; 
    user-select: none; 
    -webkit-user-select: none; 
}

/* 화살표 이미지 크기 유지 (절대 지우면 안 됨) */
.control-btn img { 
    width: 100%; 
    height: 100%; 
    object-fit: contain; 
}
        /* --- 플레이어 기체 스타일 및 애니메이션 --- */
        
        /* 1. 엔진 불꽃 코어 애니메이션 (크기 및 투명도 변화) */
        @keyframes enginePulse {
            0% { transform: scaleY(1); opacity: 1; }
            50% { transform: scaleY(1.3); opacity: 0.8; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        /* 2. 엔진 외부 후광 애니메이션 (은은한 퍼짐) */
        @keyframes engineGlow {
            0% { opacity: 0.5; filter: blur(2px); }
            50% { opacity: 0.8; filter: blur(4px); }
            100% { opacity: 0.5; filter: blur(2px); }
        }

        /* 자바스크립트에서 로딩할 SVG 이미지 데이터 (CSS 변수로 정의) */

            --img-player-left: url("data:image/svg+xml,%3Csvg viewBox='0 0 40 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='hull' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='100%25' stop-color='%23888888'/%3E%3C/linearGradient%3E%3ClinearGradient id='glass' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cstyle%3E .fireCore %7B animation: enginePulse 0.1s infinite; transform-origin: top; %7D .fireGlow %7B animation: engineGlow 0.2s infinite; %7D %3C/style%3E%3Cg transform='translate(0, 5) rotate(-5, 20, 25)'%3E%3C!-- 엔진 불꽃 (오른쪽 강조) --%3E%3Cellipse class='fireGlow' cx='14' cy='36' rx='3' ry='6' fill='rgba(255, 100, 0, 0.4)'/%3E%3Cellipse class='fireGlow' cx='28' cy='39' rx='5' ry='10' fill='rgba(255, 200, 0, 0.6)'/%3E%3Cpath class='fireCore' d='M 12 34 L 16 34 L 14 42 Z' fill='%23ff8800'/%3E%3Cpath class='fireCore' d='M 26 35 L 30 35 L 28 48 Z' fill='%23ffcc00'/%3E%3C!-- 기체 본체 (비대칭 변형) --%3E%3Cpolygon points='20,5 38,28 20,25 3,32' fill='gray' stroke='%23333' stroke-width='1'/%3E%3Cpolygon points='18,0 22,0 23,30 17,30' fill='url(%23hull)' stroke='%23555' stroke-width='1'/%3E%3Cellipse cx='19' cy='12' rx='3' ry='7' fill='url(%23glass)' transform='rotate(-3, 19, 12)'/%3E%3C/g%3E%3C/svg%3E");

            /* [우측 이동] 좌측 이동의 반대. 왼쪽 wing이 들림. 왼쪽 엔진 불꽃 강조 */
            --img-player-right: url("data:image/svg+xml,%3Csvg viewBox='0 0 40 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='hull' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='100%25' stop-color='%23888888'/%3E%3C/linearGradient%3E%3ClinearGradient id='glass' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cstyle%3E .fireCore %7B animation: enginePulse 0.1s infinite; transform-origin: top; %7D .fireGlow %7B animation: engineGlow 0.2s infinite; %7D %3C/style%3E%3Cg transform='translate(0, 5) rotate(5, 20, 25)'%3E%3C!-- 엔진 불꽃 (왼쪽 강조) --%3E%3Cellipse class='fireGlow' cx='12' cy='39' rx='5' ry='10' fill='rgba(255, 200, 0, 0.6)'/%3E%3Cellipse class='fireGlow' cx='26' cy='36' rx='3' ry='6' fill='rgba(255, 100, 0, 0.4)'/%3E%3Cpath class='fireCore' d='M 10 35 L 14 35 L 12 48 Z' fill='%23ffcc00'/%3E%3Cpath class='fireCore' d='M 24 34 L 28 34 L 26 42 Z' fill='%23ff8800'/%3E%3C!-- 기체 본체 (비대칭 변형) --%3E%3Cpolygon points='20,5 37,32 20,25 2,28' fill='gray' stroke='%23333' stroke-width='1'/%3E%3Cpolygon points='18,0 22,0 23,30 17,30' fill='url(%23hull)' stroke='%23555' stroke-width='1'/%3E%3Cellipse cx='21' cy='12' rx='3' ry='7' fill='url(%23glass)' transform='rotate(3, 21, 12)'/%3E%3C/g%3E%3C/svg%3E");

/* 음소거 버튼 전용 효과 */

        .control-btn img { width: 100%; height: 100%; object-fit: contain; }

        /* 메이즈 컨트롤러: 입체적인 SVG 방향키 */
        #mazeControls { position: absolute; top: calc((100% - 160px) / 2); left: 50%; transform: translate(-50%, -50%); width:220px; height: 160px; display: none; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px 70px; grid-template-areas: ". up ." "left . right" ". down ."; gap: 5px; z-index: 50; }

        /* 설정창 스타일 */
        #btnSettings { position: absolute; bottom: 110px; left: 10px; width: 40px; height: 40px; font-size: 24px; background-color: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 999; }
        #settingsModal { position: absolute; top: calc((100% - 150px) / 2); left: 50%; transform: translate(-50%,-50%); width: 300px; background-color: rgba(0, 0, 0, 0.9); border: 3px solid #00ffff; border-radius: 15px; padding: 25px; display: none; flex-direction: column; align-items: center; gap: 25px; z-index: 1000; box-sizing: border-box; }

        #restartBtn { position: absolute; bottom: 250px; left: 50%; transform: translateX(-50%); display: none; background-color: rgba(0, 255, 255, 0.3); font-weight: bold; border-radius: 15px; padding: 10px 20px; font-size: 18px; border: 3px solid rgba(255, 255, 255, 0.5); color: white; cursor: pointer; z-index: 10; }

function playRandomBgm() { 
    if (isMusicMuted || isVoidArea || state === 'start') return; 
    if (!bgmAudio.paused) return; 
    bgmAudio.src = bgmFiles[Math.floor(Math.random() * bgmFiles.length)];

    bgmAudio.play().catch(e => console.log(e)); 
}
function stopBgm() { bgmAudio.pause(); bgmAudio.currentTime = 0; }
function pauseBgm() { bgmAudio.pause(); }
function initAudio() { if (AudioContextClass && !audioCtx) { audioCtx = new AudioContextClass(); loadShootSound(); } if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }
function playShootSound() { 
    // 오디오 설정이 꺼져있거나, 보이드 영역이거나, 사운드가 아직 로드 안 됐으면 리턴
    if (!audioCtx || isVoidArea || !shootBuffer) return;

    // 재생용 소스 노드 생성
    const source = audioCtx.createBufferSource();
    source.buffer = shootBuffer;

    // 볼륨 조절
    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime); 

    source.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    source.start(0);
}
function playExplosionSound() {
    if (!audioCtx || isVoidArea) return;
    const bufferSize = audioCtx.sampleRate * 0.5, buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource(), filter = audioCtx.createBiquadFilter(), gain = audioCtx.createGain();
    noise.buffer = buffer; filter.type = 'lowpass'; filter.frequency.value = 800; noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5); noise.start();
}
function bindTouch(el, vKey) {
    el.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); virtualKeys[vKey] = true; }, {passive: false});
    el.addEventListener('touchend', (e) => { e.preventDefault(); virtualKeys[vKey] = false; });
    el.addEventListener('mousedown', (e) => { e.preventDefault(); initAudio(); virtualKeys[vKey] = true; });
    el.addEventListener('mouseup', (e) => { e.preventDefault(); virtualKeys[vKey] = false; });
    el.addEventListener('mouseleave', (e) => { virtualKeys[vKey] = false; });
}

}

function spawnEnemies(isTrap) {
    enemies = []; asteroids = [];
    if (stage >= 100) { let bWidth = 30, bHeight = 120, bHp = 300 * enemyHpMod; enemies.push({ type: 'super-boss', x: canvas.width / 2 - bWidth / 2, y: 50, width: bWidth, height: bHeight, speedX: 2 * enemySpeedMod, hp: bHp }); return; }
    if (stage >= 3) { let numAsteroids = Math.floor(Math.random() * 5); for (let i = 0; i < numAsteroids; i++) asteroids.push({ x: Math.random() * (canvas.width - 120), y: Math.random() * 150 + 200, width: 120, height: 120, hp: 10 }); }
    let rows = isTrap ? 5 : 3, cols = isTrap ? 8 : 6, startY = 60, bossCount = 0, spawnMidBoss = false, midBossCount = 0;
    if (stage >= 10) { let rand = Math.random(); if (rand < 0.20) { bossCount = stage >= 50 ? Math.floor(Math.random() * 3) + 1 : 1; spawnMidBoss = true; midBossCount = Math.floor(Math.random() * 5) + 1; } else if (rand < 0.75) { spawnMidBoss = true; midBossCount = Math.floor(Math.random() * 5) + 1; } }
    let startX = 0;
    if (bossCount > 0) { let bWidth = 30, bHeight = 120, bHp = 50 * enemyHpMod, spacing = 80; startX = (canvas.width - (bossCount * spacing)) / 2; for (let i = 0; i < bossCount; i++) enemies.push({ type: 'boss', x: startX + i * spacing + 25, y: 30, width: bWidth, height: bHeight, speedX: 1 * enemySpeedMod, hp: bHp }); }
    if (spawnMidBoss) { let bWidth = 30, bHeight = 60, bHp = 20 * enemyHpMod, spacing = 60; startX = (canvas.width - (midBossCount * spacing)) / 2; for (let i = 0; i < midBossCount; i++) enemies.push({ type: 'mid-boss', x: startX + i * spacing + 15, y: 30, width: bWidth, height: bHeight, speedX: -1 * enemySpeedMod, hp: bHp }); startY = 30 + bHeight + 20; }
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) enemies.push({ type: 'minion', x: 60 + c * 50, y: startY + r * 40, width: 30, height: 30, speedX: 1 * enemySpeedMod, hp: 1 * enemyHpMod });

function update() {
    stars.forEach(st => { st.y += st.v; if (st.y > canvas.height) { st.y = 0; st.x = Math.random() * canvas.width; } });
    if (state === 'playing' && !isPaused) {
        if (hitBlinkTimer > 0) hitBlinkTimer--;
        
        // 애니메이션 이동 처리
        let isMoving = false;
        if (virtualKeys['ArrowLeft'] && player.x > currentWallThickness) { player.x -= player.speed; currentPlayerImg = svgLeft; isMoving = true; }
        if (virtualKeys['ArrowRight'] && player.x < canvas.width - player.width - currentWallThickness) { player.x += player.speed; currentPlayerImg = svgRight; isMoving = true; }
        if (!isMoving) currentPlayerImg = svgIdle;
        if (player.x < currentWallThickness) player.x = currentWallThickness;
        if (player.x > canvas.width - player.width - currentWallThickness) player.x = canvas.width - player.width - currentWallThickness;
        let fireRate = 0.0002 + Math.floor(stage / 5) * 0.0002;
        for (let j = enemies.length - 1; j >= 0; j--) {
            let e = enemies[j]; e.x += e.speedX;
            if (e.x <= 0 || e.x + e.width >= canvas.width) { e.speedX *= -1; e.y += 20; e.x = e.x <= 0 ? 0 : canvas.width - e.width; }
            if (stage > 3 && Math.random() < fireRate * enemySpeedMod) enemyBullets.push({ x: e.x + e.width / 2 - 2, y: e.y + e.height, width: 4, height: 10, speedY: 4 * enemySpeedMod });
            let enemyDestroyed = false;
            for (let a = asteroids.length - 1; a >= 0; a--) {
                if (isColliding(e, asteroids[a])) {
                    if (e.type === 'minion') { enemies.splice(j, 1); enemyDestroyed = true; break; }
                    else {
                        let pts = []; for(let p = 0; p < 20; p++) pts.push({ x: asteroids[a].x + asteroids[a].width/2, y: asteroids[a].y + asteroids[a].height/2, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 40 });
                        explosions.push({ type: 'particles', particles: pts }); asteroids.splice(a, 1);
                    }
                }
            }
            if (enemyDestroyed) continue;
        }

    hitBlinkTimer = 30;   // 보호막 타격 시 짧은 무적 시간 부여
} else {
    lives--;              // 보호막이 0개면 원래대로 목숨(아머) 차감
    playExplosionSound(); // 피격(폭발) 소리 재생
    hitBlinkTimer = 60;   // 피격 무적 시간
    if (lives <= 0)       // (이 뒤의 사망 처리 기존 코드는 그대로 유지)
 { state = 'gameover'; mobileControls.style.display = 'none'; if (btnPause) btnPause.style.display = 'none'; mazeControls.style.display = 'none'; restartBtn.style.display = 'flex'; saveScore(); } else { player.weaponLevel = Math.max(1, player.weaponLevel - 1); permanentWeaponSpeedLevel = Math.max(0, permanentWeaponSpeedLevel - 1); player.shield = 0; } }
}
function loop() { if (!isPaused) update(); draw(); requestAnimationFrame(loop); }
function handleStartScreen(e) { 
    if (e && e.target && (e.target.closest('#btnSettings') || e.target.closest('#settingsModal') || e.target.closest('#btnPause') || e.target.closest('#btnMusic'))) return; 
    
    if (state === 'start') { 
        initAudio(); resetGame(); 
    } else if (state === 'ending1') { 
        // 엔딩 1 화면을 터치하면 선택창 띄우기
        state = 'ending1_choice'; 
        document.getElementById('ending1Choice').style.display = 'flex'; 
    } 
}

// --- 보상형 광고 시스템 ---
let lastAdTime = 0; // 마지막으로 보상을 받은 시간 (기록용)
const AD_COOLDOWN = 10 * 60 * 1000; // 10분 = 600,000 밀리초

// 1초마다 버튼의 색상과 남은 시간을 실시간으로 바꿔주는 타이머!
setInterval(() => {
    const btn = document.getElementById('btnWatchAd');
    const now = Date.now();
    
    // 쿨타임이 아직 남았을 때
    if (lastAdTime > 0 && now - lastAdTime < AD_COOLDOWN) {
        const remain = AD_COOLDOWN - (now - lastAdTime);
        const m = Math.floor(remain / 60000);
        const s = Math.floor((remain % 60000) / 1000).toString().padStart(2, '0');
        btn.innerText = `⏳ ${m}:${s}`;
        btn.style.backgroundColor = '#555'; // 버튼을 회색으로 비활성화
        btn.style.color = '#ccc';
    } else {
        // 쿨타임이 다 돌아서 다시 누를 수 있을 때
        btn.innerText = '📺 AD Buff';
        btn.style.backgroundColor = '#ffaa00'; // 주황색으로 복구
        btn.style.color = 'black';
    }
}, 1000);
document.getElementById('btnWatchAd').addEventListener('click', (e) => {
    e.stopPropagation();
    
    // 🚨 쿨타임 방어벽: 10분이 안 지났으면 못 누르게 튕겨냄
    if (lastAdTime > 0 && Date.now() - lastAdTime < AD_COOLDOWN) {
        alert("Not available.");
        return; 
    }
    
    // 게임 중이라면 일시 정지
    if (state === 'playing') isPaused = true; 
    
    // 1. 광고 모달 띄우기
    const adModal = document.getElementById('adMockModal');
    const adTimerEl = document.getElementById('adTimer');
    adModal.style.display = 'flex';
    let timeLeft = 3; // 3초 가짜 대기 시간
    adTimerEl.innerText = timeLeft;
    const timer = setInterval(() => {
        timeLeft--;
        adTimerEl.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            adModal.style.display = 'none';
            // 2. 광고가 끝나면 보상 선택 창 띄우기
            document.getElementById('rewardChoiceModal').style.display = 'flex';
        }
    }, 1000);
});

// --- 슬라이드(드래그) 조작 지원 시스템 ---
// 손가락이 화면 위를 미끄러질 때(touchmove) 실행
document.addEventListener('touchmove', (e) => {
    // 1. 일단 모든 이동 방향을 정지 (총알 발사 키 등은 건드리지 않음)
    virtualKeys['ArrowLeft'] = false;
    virtualKeys['ArrowRight'] = false;
    virtualKeys['ArrowUp'] = false;
    virtualKeys['ArrowDown'] = false;

    // 2. 현재 화면에 닿아있는 '모든' 손가락의 위치를 추적 (멀티 터치 지원)
    for (let i = 0; i < e.touches.length; i++) {
        const touch = e.touches[i];
        
        // 손가락의 현재 X, Y 좌표 아래에 있는 HTML 요소(버튼)를 찾아냄
        const targetElement = document.elementFromPoint(touch.clientX, touch.clientY);
        
        // 방향키(.control-btn)일 때
        if (targetElement && (targetElement.classList.contains('control-btn') || targetElement.closest('.control-btn'))) {
            e.preventDefault(); // 화면 전체가 스크롤되는 것을 방지
            
            // 어떤 방향키인지 확인하고 해당 방향 활성화
            const btnId = targetElement.id || targetElement.closest('.control-btn').id;
            if (btnId === 'btnLeft') virtualKeys['ArrowLeft'] = true;
            if (btnId === 'btnRight') virtualKeys['ArrowRight'] = true;
            if (btnId === 'btnUp') virtualKeys['ArrowUp'] = true;
            if (btnId === 'btnDown') virtualKeys['ArrowDown'] = true;
        }
    }
}, { passive: false });

// 손가락을 화면에서 완전히 뗐을 때(touchend) 실행
function handleTouchStop(e) {
    // 1. 손가락이 떨어지는 즉시 묻지도 따지지도 않고 모든 이동 강제 정지
    virtualKeys['ArrowLeft'] = false;
    virtualKeys['ArrowRight'] = false;
    virtualKeys['ArrowUp'] = false;
    virtualKeys['ArrowDown'] = false;

    // 2. 만약 아직 화면에 남아있는 다른 손가락이 방향키를 누르고 있다면 그것만 다시 살림
    for (let i = 0; i < e.touches.length; i++) {
        const touch = e.touches[i];
        const targetElement = document.elementFromPoint(touch.clientX, touch.clientY);
        if (targetElement && (targetElement.classList.contains('control-btn') || targetElement.closest('.control-btn'))) {
            const btnId = targetElement.id || targetElement.closest('.control-btn').id;
            if (btnId === 'btnLeft') virtualKeys['ArrowLeft'] = true;
            if (btnId === 'btnRight') virtualKeys['ArrowRight'] = true;
            if (btnId === 'btnUp') virtualKeys['ArrowUp'] = true;
            if (btnId === 'btnDown') virtualKeys['ArrowDown'] = true;
        }
    }
}
document.addEventListener('touchend', handleTouchStop);
document.addEventListener('touchcancel', handleTouchStop);
loop();
