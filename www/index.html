<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gem's Shooting game</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #222; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; cursor: pointer; padding-bottom: 220px; box-sizing: border-box; }
        canvas { background-color: black; border: 2px solid #555; max-width: 100%; max-height: 100%; touch-action: none; }

        /* 모바일 컨트롤러: 투명 배경 및 배치 최적화 */
        #mobileControls { position: absolute; bottom: 0; left: 0; width: 100%; max-width: 600px; height: 220px; display: none; justify-content: space-between; align-items: center; box-sizing: border-box; pointer-events: none; z-index: 50; padding: 0 20px; }
.control-group { 
    display: flex; 
    pointer-events: auto; 
    align-items: center; 
}

.control-btn { 
    width: 60px; 
    height: 60px; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    background-color: transparent; 
    border: none; 
    cursor: pointer; 
    user-select: none; 
    -webkit-user-select: none; 
}

/* 화살표 이미지 크기 유지 (절대 지우면 안 됨) */
.control-btn img { 
    width: 100%; 
    height: 100%; 
    object-fit: contain; 
}
        /* --- 플레이어 기체 스타일 및 애니메이션 --- */
        
        /* 1. 엔진 불꽃 코어 애니메이션 (크기 및 투명도 변화) */
        @keyframes enginePulse {
            0% { transform: scaleY(1); opacity: 1; }
            50% { transform: scaleY(1.3); opacity: 0.8; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        /* 2. 엔진 외부 후광 애니메이션 (은은한 퍼짐) */
        @keyframes engineGlow {
            0% { opacity: 0.5; filter: blur(2px); }
            50% { opacity: 0.8; filter: blur(4px); }
            100% { opacity: 0.5; filter: blur(2px); }
        }

        /* 자바스크립트에서 로딩할 SVG 이미지 데이터 (CSS 변수로 정의) */
        :root {
            /* [기본/정지 상태] 대칭 구조 */
            --img-player-idle: url("data:image/svg+xml,%3Csvg viewBox='0 0 40 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='hull' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='100%25' stop-color='%23888888'/%3E%3C/linearGradient%3E%3ClinearGradient id='glass' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cstyle%3E .fireCore %7B animation: enginePulse 0.1s infinite; transform-origin: top; %7D .fireGlow %7B animation: engineGlow 0.2s infinite; %7D %3C/style%3E%3Cg transform='translate(0, 5)'%3E%3C!-- 엔진 불꽃 (애니메이션 적용) --%3E%3Cellipse class='fireGlow' cx='13' cy='38' rx='4' ry='8' fill='rgba(255, 150, 0, 0.5)'/%3E%3Cellipse class='fireGlow' cx='27' cy='38' rx='4' ry='8' fill='rgba(255, 150, 0, 0.5)'/%3E%3Cpath class='fireCore' d='M 11 35 L 15 35 L 13 45 Z' fill='%23ffaa00'/%3E%3Cpath class='fireCore' d='M 25 35 L 29 35 L 27 45 Z' fill='%23ffaa00'/%3E%3C!-- 기체 본체 --%3E%3Cpolygon points='20,5 40,30 20,25 0,30' fill='gray' stroke='%23333' stroke-width='1'/%3E%3Cpolygon points='18,0 22,0 24,30 16,30' fill='url(%23hull)' stroke='%23555' stroke-width='1'/%3E%3Cellipse cx='20' cy='12' rx='3' ry='7' fill='url(%23glass)'/%3E%3C/g%3E%3C/svg%3E");

            /* [좌측 이동] 오른쪽 wing이 들리고 본체가 왼쪽으로 기울어짐. 오른쪽 엔진 불꽃이 커짐 */
            --img-player-left: url("data:image/svg+xml,%3Csvg viewBox='0 0 40 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='hull' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='100%25' stop-color='%23888888'/%3E%3C/linearGradient%3E%3ClinearGradient id='glass' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cstyle%3E .fireCore %7B animation: enginePulse 0.1s infinite; transform-origin: top; %7D .fireGlow %7B animation: engineGlow 0.2s infinite; %7D %3C/style%3E%3Cg transform='translate(0, 5) rotate(-5, 20, 25)'%3E%3C!-- 엔진 불꽃 (오른쪽 강조) --%3E%3Cellipse class='fireGlow' cx='14' cy='36' rx='3' ry='6' fill='rgba(255, 100, 0, 0.4)'/%3E%3Cellipse class='fireGlow' cx='28' cy='39' rx='5' ry='10' fill='rgba(255, 200, 0, 0.6)'/%3E%3Cpath class='fireCore' d='M 12 34 L 16 34 L 14 42 Z' fill='%23ff8800'/%3E%3Cpath class='fireCore' d='M 26 35 L 30 35 L 28 48 Z' fill='%23ffcc00'/%3E%3C!-- 기체 본체 (비대칭 변형) --%3E%3Cpolygon points='20,5 38,28 20,25 3,32' fill='gray' stroke='%23333' stroke-width='1'/%3E%3Cpolygon points='18,0 22,0 23,30 17,30' fill='url(%23hull)' stroke='%23555' stroke-width='1'/%3E%3Cellipse cx='19' cy='12' rx='3' ry='7' fill='url(%23glass)' transform='rotate(-3, 19, 12)'/%3E%3C/g%3E%3C/svg%3E");

            /* [우측 이동] 좌측 이동의 반대. 왼쪽 wing이 들림. 왼쪽 엔진 불꽃 강조 */
            --img-player-right: url("data:image/svg+xml,%3Csvg viewBox='0 0 40 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='hull' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='100%25' stop-color='%23888888'/%3E%3C/linearGradient%3E%3ClinearGradient id='glass' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cstyle%3E .fireCore %7B animation: enginePulse 0.1s infinite; transform-origin: top; %7D .fireGlow %7B animation: engineGlow 0.2s infinite; %7D %3C/style%3E%3Cg transform='translate(0, 5) rotate(5, 20, 25)'%3E%3C!-- 엔진 불꽃 (왼쪽 강조) --%3E%3Cellipse class='fireGlow' cx='12' cy='39' rx='5' ry='10' fill='rgba(255, 200, 0, 0.6)'/%3E%3Cellipse class='fireGlow' cx='26' cy='36' rx='3' ry='6' fill='rgba(255, 100, 0, 0.4)'/%3E%3Cpath class='fireCore' d='M 10 35 L 14 35 L 12 48 Z' fill='%23ffcc00'/%3E%3Cpath class='fireCore' d='M 24 34 L 28 34 L 26 42 Z' fill='%23ff8800'/%3E%3C!-- 기체 본체 (비대칭 변형) --%3E%3Cpolygon points='20,5 37,32 20,25 2,28' fill='gray' stroke='%23333' stroke-width='1'/%3E%3Cpolygon points='18,0 22,0 23,30 17,30' fill='url(%23hull)' stroke='%23555' stroke-width='1'/%3E%3Cellipse cx='21' cy='12' rx='3' ry='7' fill='url(%23glass)' transform='rotate(3, 21, 12)'/%3E%3C/g%3E%3C/svg%3E");

/* 음소거 버튼 전용 효과 */
#btnMusic {
    transition: opacity 0.2s;
}

/* 발사 버튼 강조 */
#btnShoot {
    box-shadow: 0 0 15px rgba(255, 100, 0, 0.4);
}
        .control-btn img { width: 100%; height: 100%; object-fit: contain; }

        /* 메이즈 컨트롤러: 입체적인 SVG 방향키 */
        #mazeControls { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; display: none; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px 70px; grid-template-areas: ". up ." "left . right" ". down ."; gap: 5px; z-index: 50; }
        .maze-btn { width: 70px; height: 70px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: transparent; border: none; opacity: 0.6; transition: transform 0.1s, opacity 0.2s; cursor: pointer; }
        .maze-btn.active { opacity: 1; filter: drop-shadow(0 0 10px cyan); }

        #mazeUp { grid-area: up; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 50 15 L 85 55 L 65 55 L 65 85 L 35 85 L 35 55 L 15 55 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E"); }
        #mazeDown { grid-area: down; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 50 85 L 15 45 L 35 45 L 35 15 L 65 15 L 65 45 L 85 45 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E"); }
        #mazeLeft { grid-area: left; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%2300ffff'/%3E%3Cstop offset='100%25' stop-color='%230055aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 15 50 L 55 15 L 55 35 L 85 35 L 85 65 L 55 65 L 55 85 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E"); }
        #mazeRight { grid-area: right; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%230055aa'/%3E%3Cstop offset='100%25' stop-color='%2300ffff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 85 50 L 45 85 L 45 65 L 15 65 L 15 35 L 45 35 L 45 15 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='3' stroke-linejoin='round'/%3E%3C/svg%3E"); }

        /* 설정창 스타일 */
        #btnSettings { position: absolute; top: 35px; right: 15px; width: 45px; height: 45px; font-size: 24px; background-color: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 999; }
        #settingsModal { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 300px; background-color: rgba(0, 0, 0, 0.9); border: 3px solid #00ffff; border-radius: 15px; padding: 25px; display: none; flex-direction: column; align-items: center; gap: 25px; z-index: 1000; }
        #settingsModal h2 { margin: 0; color: yellow; font-size: 28px; }
        .slider-container { display: flex; flex-direction: column; width: 100%; color: white; text-align: left; font-size: 18px; gap: 10px; }
        .modal-btn { background-color: #444; border: 2px solid white; color: white; padding: 12px 20px; font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .modal-btn.exit { background-color: #aa0000; border-color: #ff5555; }
        #restartBtn { position: absolute; bottom: 250px; left: 50%; transform: translateX(-50%); display: none; background-color: rgba(0, 255, 255, 0.3); font-weight: bold; border-radius: 15px; padding: 20px 40px; font-size: 32px; border: 3px solid rgba(255, 255, 255, 0.5); color: white; cursor: pointer; z-index: 10; }
    </style>

<div id="gameContainer">
    <canvas id="gameCanvas" width="600" height="800"></canvas>
    
    <div id="btnSettings">⚙️</div>
    
    <div id="settingsModal">
        <h2>SETTINGS</h2>
        <div class="slider-container">
            <label for="bgmVolume">BGM Volume</label>
            <input type="range" id="bgmVolume" min="0" max="1" step="0.1" value="1">
        </div>
        <button class="modal-btn" id="btnResume">Resume Game</button>
        <button class="modal-btn exit" id="btnExitToTitle">Exit to Title</button>
    </div>

<div id="mobileControls">

    <div class="control-group" style="align-items: flex-end; gap: 20px;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <div class="control-btn" id="btnPause" style="font-size: 24px;">⏸️</div>

        </div>
        <div class="control-btn" id="btnShoot" style="width: 75px; height: 75px; font-size: 28px; background-color: rgba(255, 255, 255, 0.3); border: 3px solid rgba(255, 255, 255, 0.5); border-radius: 50%;">🔥</div>
    </div>
</div>

    <div id="mazeControls">

        <div class="maze-btn" id="mazeLeft"></div>
        <div class="maze-btn" id="mazeRight"></div>
        <div class="maze-btn" id="mazeDown"></div>
    </div>

    <div id="restartBtn">TO TITLE</div>
</div>

function playShootSound() { 
    if (!audioCtx || isVoidArea) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(); osc.type = 'square'; osc.connect(gain); gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime + 0.01; osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
    gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1); osc.start(t); osc.stop(t + 0.1);
}
function playExplosionSound() {
    if (!audioCtx || isVoidArea) return;
    const bufferSize = audioCtx.sampleRate * 0.5, buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource(), filter = audioCtx.createBiquadFilter(), gain = audioCtx.createGain();
    noise.buffer = buffer; filter.type = 'lowpass'; filter.frequency.value = 800; noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5); noise.start();
}

function bindTouch(el, vKey) {
    el.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); virtualKeys[vKey] = true; }, {passive: false});

    el.addEventListener('mousedown', (e) => { e.preventDefault(); initAudio(); virtualKeys[vKey] = true; });
    el.addEventListener('mouseup', (e) => { e.preventDefault(); virtualKeys[vKey] = false; });
    el.addEventListener('mouseleave', (e) => { virtualKeys[vKey] = false; });
}

        { name: " Weapon speed up", type: "buff", apply: () => { permanentWeaponSpeedLevel = Math.min(3, permanentWeaponSpeedLevel + 1); } },
        { name: " Engine booster", type: "buff", apply: () => { permanentPlayerSpeed = 4; player.speed = permanentPlayerSpeed; } },
        { name: " Armor +1", type: "buff", apply: () => { lives++; } },
        { name: " Weapon pod -1", type: "debuff", apply: () => { player.weaponLevel = Math.max(1, player.weaponLevel - 1); } },
        { name: " Pods overheated", type: "debuff", apply: () => { portOverheatMultiplier = 2; } },
        { name: " EMP! (Pods down)", type: "debuff", apply: () => { silenceUntil = Date.now() + Math.floor(Math.random() * 20000) + 10000; } },
        { name: " Enemy speed up", type: "debuff", apply: () => { stageEnemySpeedMod = 0.5; } },
        { name: " Engine overheated", type: "debuff", apply: () => { player.speed = 1; } },

function spawnEnemies(isTrap) {

function update() {
    stars.forEach(st => { st.y += st.v; if (st.y > canvas.height) { st.y = 0; st.x = Math.random() * canvas.width; } });
    if (state === 'playing' && !isPaused) {
        if (hitBlinkTimer > 0) hitBlinkTimer--;
        
        // 애니메이션 이동 처리
        let isMoving = false;
        if (virtualKeys['ArrowLeft'] && player.x > currentWallThickness) { player.x -= player.speed; currentPlayerImg = svgLeft; isMoving = true; }
        if (virtualKeys['ArrowRight'] && player.x < canvas.width - player.width - currentWallThickness) { player.x += player.speed; currentPlayerImg = svgRight; isMoving = true; }
        if (!isMoving) currentPlayerImg = svgIdle;
        
        if (player.x < currentWallThickness) player.x = currentWallThickness;
        if (player.x > canvas.width - player.width - currentWallThickness) player.x = canvas.width - player.width - currentWallThickness;

        let fireRate = 0.0002 + Math.floor(stage / 5) * 0.0002;
        for (let j = enemies.length - 1; j >= 0; j--) {
            let e = enemies[j]; e.x += e.speedX;
            if (e.x <= 0 || e.x + e.width >= canvas.width) { e.speedX *= -1; e.y += 20; e.x = e.x <= 0 ? 0 : canvas.width - e.width; }
            if (stage > 3 && Math.random() < fireRate * enemySpeedMod) enemyBullets.push({ x: e.x + e.width / 2 - 2, y: e.y + e.height, width: 4, height: 10, speedY: 4 * enemySpeedMod });
            let enemyDestroyed = false;
            for (let a = asteroids.length - 1; a >= 0; a--) {
                if (isColliding(e, asteroids[a])) {
                    if (e.type === 'minion') { enemies.splice(j, 1); enemyDestroyed = true; break; }
                    else {
                        let pts = []; for(let p = 0; p < 20; p++) pts.push({ x: asteroids[a].x + asteroids[a].width/2, y: asteroids[a].y + asteroids[a].height/2, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 40 });
                        explosions.push({ type: 'particles', particles: pts }); asteroids.splice(a, 1);
                    }
                }
            }
            if (enemyDestroyed) continue;
        }

        const wsMult = [1, 1.5, 2, 3];
        let actualCooldown = (baseShootCooldown / wsMult[permanentWeaponSpeedLevel]) * portOverheatMultiplier;
        if (virtualKeys[' '] && Date.now() - lastShootTime > actualCooldown && Date.now() > silenceUntil) {
            playShootSound();
            lastShootTime = Date.now(); // 쿨타임 초기화
            let bSpeed = -7, isPwr = player.isPowerWeapon, pwrDmg = isPwr ? 2 : 1, bw = isPwr ? 14 : 4, bh = isPwr ? 14 : 10, bList = [];
            let cx = player.x + player.width / 2 - bw / 2, lX = player.x, rX = player.x + player.width - bw, lmX = player.x + player.width * 0.25 - bw / 2, rmX = player.x + player.width * 0.75 - bw / 2, yTop = player.y, yBot = player.y + player.height - 10;
            
            // 1~4레벨 로직 (복구됨)
            if (player.weaponLevel === 1) { 
                bList.push({ x: cx, y: yTop }); 
            }
            else if (player.weaponLevel === 2) { 
                bList.push({ x: lX + 5, y: yTop }); 
                bList.push({ x: rX - 5, y: yTop }); 
            }
            else if (player.weaponLevel === 3) { 
                bList.push({ x: lX, y: yBot }); 
                bList.push({ x: cx, y: yTop }); 
                bList.push({ x: rX, y: yBot }); 
            }
            else if (player.weaponLevel === 4) { 
                bList.push({ x: lX, y: yBot }); 
                bList.push({ x: lmX, y: yTop + 5 }); 
                bList.push({ x: rmX, y: yTop + 5 }); 
                bList.push({ x: rX, y: yBot }); 
            }
            // 5레벨 로직
            else if (player.weaponLevel === 5) { 
                bList.push({ x: lX, y: yBot }); 
                bList.push({ x: lmX, y: yTop + 5 }); 
                bList.push({ x: cx, y: yTop }); 
                bList.push({ x: rmX, y: yTop + 5 }); 
                bList.push({ x: rX, y: yBot }); 
            }
            // 6레벨 로직 (안쪽 4발 + 바깥쪽 휘어지는 2발)
            else if (player.weaponLevel >= 6) { 
                bList.push({ x: lX, y: yBot }); 
                bList.push({ x: lmX, y: yTop + 5 }); 
                bList.push({ x: rmX, y: yTop + 5 }); 
                bList.push({ x: rX, y: yBot }); 
                bList.push({ x: player.x - 15, y: yBot + 10, speedX: -6, isCurved: true });
                bList.push({ x: player.x + player.width + 15 - bw, y: yBot + 10, speedX: 6, isCurved: true });
            }

            bList.forEach(pos => bullets.push({ 
                x: pos.x, y: pos.y, width: bw, height: bh, 
                speedX: pos.speedX || 0, 
                speedY: bSpeed, power: pwrDmg, isPower: isPwr, 
                isCurved: pos.isCurved || false 
            }));
        }    
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].x += bullets[i].speedX; // 가로로 날아가는 힘
            bullets[i].y += bullets[i].speedY;
            if (bullets[i].isCurved) bullets[i].speedX *= 0.85; // 가로 속도를 0으로 서서히 줄임 (마법의 곡선 궤적)
            
            // 화면 밖으로 완전히 벗어나면 삭제
            if (bullets[i].y < 0 || bullets[i].x < -50 || bullets[i].x > canvas.width + 50) { 
                bullets.splice(i, 1); 
                continue; 
            }
            let hitAsteroid = false;
            for (let a = asteroids.length - 1; a >= 0; a--) {
                if (isColliding(bullets[i], asteroids[a])) {
                    asteroids[a].hp -= bullets[i].power; bullets.splice(i, 1); hitAsteroid = true;
                    if (asteroids[a].hp <= 0) {
                        let pts = []; for (let p = 0; p < 20; p++) pts.push({ x: asteroids[a].x + asteroids[a].width/2, y: asteroids[a].y + asteroids[a].height/2, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 40 });
                        explosions.push({ type: 'particles', particles: pts }); asteroids.splice(a, 1);
                    }
                    break;
                }
            }
            if (hitAsteroid) continue;

            for (let j = enemies.length - 1; j >= 0; j--) {
                let e = enemies[j];
                if (!(e.type === 'boss' && enemies.filter(en => en.type === 'minion').length > 0) && isColliding(bullets[i], e)) {
                    e.hp -= bullets[i].power; bullets.splice(i, 1);
                    if (e.hp <= 0) {
                        if (e.type === 'super-boss') { score += 1000; screenShake = 60; explosions.push({ x: e.x + e.width / 2, y: e.y + e.height / 2, type: 'blackhole', radius: 1, maxRadius: 300, state: 'implode', timer: 0 }); }
                        else if (e.type === 'boss') { score += 100; explosions.push({ x: e.x + e.width / 2, y: e.y + e.height / 2, type: 'plasma', radius: 1, maxRadius: 150, alpha: 1 }); }
                        else if (e.type === 'mid-boss') { score += 20; explosions.push({ x: e.x + e.width / 2, y: e.y + e.height / 2, type: 'burst', radius: 1, maxRadius: 60, alpha: 1 }); }
                        else { score += 1; }
                        enemies.splice(j, 1);
                    }
                    break;
                }
            }
        }

        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            enemyBullets[i].y += enemyBullets[i].speedY;
            if (enemyBullets[i].y > canvas.height) { enemyBullets.splice(i, 1); continue; }
            let hitAsteroid = false;
            for (let a = asteroids.length - 1; a >= 0; a--) {
                if (isColliding(enemyBullets[i], asteroids[a])) {
                    asteroids[a].hp -= 1; enemyBullets.splice(i, 1); hitAsteroid = true;
                    if (asteroids[a].hp <= 0) {
                        let pts = []; for (let p = 0; p < 20; p++) pts.push({ x: asteroids[a].x + asteroids[a].width/2, y: asteroids[a].y + asteroids[a].height/2, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 40 });
                        explosions.push({ type: 'particles', particles: pts }); asteroids.splice(a, 1);
                    }
                    break;
                }
            }
            if (hitAsteroid) continue;
        }

        for (let i = explosions.length - 1; i >= 0; i--) {
            let ex = explosions[i];
            if (ex.type === 'plasma') { ex.radius += 5; ex.alpha -= 0.03; if (ex.alpha <= 0) explosions.splice(i, 1); }
            else if (ex.type === 'burst') { ex.radius += 6; ex.alpha -= 0.05; if (ex.alpha <= 0) explosions.splice(i, 1); }
            else if (ex.type === 'blackhole') { ex.timer++; if (ex.state === 'implode') { if (ex.timer < 30) ex.radius += 1.5; else { ex.state = 'explode'; ex.timer = 0; ex.radius = 10; } } else { ex.radius += 20; if (ex.radius > ex.maxRadius) explosions.splice(i, 1); } }
            else if (ex.type === 'particles') { ex.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; }); ex.particles = ex.particles.filter(p => p.life > 0); if (ex.particles.length === 0) explosions.splice(i, 1); }
        }

        if (screenShake > 0) screenShake--;

        if (hitBlinkTimer === 0) {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                if (isColliding(enemyBullets[i], player)) { 
                    enemyBullets.splice(i, 1); 
                    if (player.shield > 0) { // 보호막이 1개 이상 있으면
                        player.shield--;     // 1개 깎음
                        hitBlinkTimer = 30;  // 무적 시간 부여
                    } else { 
                        handlePlayerDeath(); 
                        break; 
                    } 
                }
            }
        }
        if (enemies.length === 0 && explosions.length === 0) {
            if (stage >= 100) { state = 'missioncomplete'; mobileControls.style.display = 'none'; if(btnPause) btnPause.style.display = 'none'; restartBtn.style.display = 'flex'; saveScore(); }
            else { state = 'choosing'; bullets = []; enemyBullets = []; currentExits = generateNextRoom(); updateMazeControls(); mobileControls.style.display = 'none'; if(btnPause) btnPause.style.display = 'none'; mazeControls.style.display = 'grid'; }
        }
    }
}
function drawUI() {
    ctx.fillStyle = 'white'; ctx.font = '20px Arial'; ctx.textAlign = 'left';
    let uiText = `Stage: ${stage} | Score: ${score} | Armor: ${lives}`;
    if (Date.now() < silenceUntil) uiText += ` | EMP: ${Math.ceil((silenceUntil - Date.now()) / 1000)}초`;
    ctx.fillText(uiText, 10, 30);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save();
    if (screenShake > 0) ctx.translate((Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15);
    if (!isVoidArea) { ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; stars.forEach(st => ctx.fillRect(st.x, st.y, st.s, st.s)); }

    if (state === 'start') {
        playerTempImg.src = svgIdle;
        ctx.drawImage(playerTempImg, 280, 650, 40, 40);
        ctx.drawImage(images.midBoss, 250, 150, 100, 200); ctx.drawImage(images.minion, 140, 210, 80, 80); ctx.drawImage(images.asteroid, 380, 200, 100, 100);
        if (Math.floor(Date.now() / 500) % 2 === 0) { ctx.fillStyle = 'yellow'; ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.fillText("- TOUCH TO START -", 300, 450); }
    } else if (state === 'playing') {
        drawUI();
        asteroids.forEach(a => { ctx.drawImage(images.asteroid, a.x, a.y, a.width, a.height); ctx.fillStyle = 'white'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center'; ctx.fillText(a.hp, a.x + a.width / 2, a.y + a.height / 2 + 8); });
        if (Date.now() < silenceUntil) ctx.globalAlpha = 0.5;
        
        // 애니메이션 적용 기체 그리기
        if (hitBlinkTimer === 0 || Math.floor(hitBlinkTimer / 5) % 2 === 0) {
            playerTempImg.src = currentPlayerImg;
            ctx.drawImage(playerTempImg, player.x, player.y, player.width, player.height);
        }
        ctx.globalAlpha = 1.0;

        if (player.shield > 0) { 
            ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(player.x + 20, player.y + 20, 30, 0, Math.PI * 2); ctx.stroke(); 
            if (player.shield > 1) { // 2개 중첩 시 바깥에 파란 띠 하나 더 생성
                ctx.strokeStyle = '#00ffff'; ctx.beginPath(); ctx.arc(player.x + 20, player.y + 20, 38, 0, Math.PI * 2); ctx.stroke(); 
            }
        }
        bullets.forEach(b => { if (b.isPower) { ctx.fillStyle = 'cyan'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.fillText('⭐', b.x + b.width / 2, b.y + b.height / 2 + 5); } else { ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, b.width, b.height); } });
        ctx.fillStyle = '#ff5500'; enemyBullets.forEach(eb => ctx.fillRect(eb.x, eb.y, eb.width, eb.height));
        enemies.forEach(e => { let img = e.type === 'mid-boss' ? images.midBoss : (e.type === 'boss' ? images.boss : (e.type === 'super-boss' ? images.superBoss : images.minion)); ctx.drawImage(img, e.x, e.y, e.width, e.height); });
        explosions.forEach(ex => {
            ctx.beginPath();
            if (ex.type === 'plasma') { ctx.arc(ex.x, ex.y, ex.radius, 0, Math.PI * 2); ctx.strokeStyle = `rgba(0, 255, 255, ${ex.alpha})`; ctx.lineWidth = 6; ctx.stroke(); }
            else if (ex.type === 'burst') { ctx.arc(ex.x, ex.y, ex.radius, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 100, 0, ${ex.alpha})`; ctx.fill(); }
            else if (ex.type === 'blackhole') { ctx.arc(ex.x, ex.y, ex.radius, 0, Math.PI * 2); if (ex.state === 'implode') { ctx.fillStyle = 'black'; ctx.shadowBlur = 30; ctx.shadowColor = 'purple'; ctx.fill(); ctx.shadowBlur = 0; } else { ctx.fillStyle = `rgba(255, 255, 255, ${1 - ex.radius / ex.maxRadius})`; ctx.fill(); } }
            else if (ex.type === 'particles') { ex.particles.forEach(p => { ctx.fillStyle = `rgba(170, 170, 170, ${p.life / 40})`; ctx.fillRect(p.x, p.y, 4, 4); }); }
        });
        if (effectDisplayTimer > 0) { ctx.fillStyle = 'yellow'; ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center'; ctx.fillText(activeEffectText, canvas.width / 2, canvas.height / 2); effectDisplayTimer--; }
        
        // 포즈 텍스트
        if (isPaused) { ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = 'yellow'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center'; ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2); }
    } else if (state === 'choosing') { ctx.fillStyle = 'yellow'; ctx.textAlign = 'center'; ctx.font = 'bold 36px Arial'; ctx.fillText("Area Clear!", 300, 100); ctx.font = '22px Arial'; ctx.fillText("Choose the Next Area.", 300, 150); }
    else if (state === 'gameover' || state === 'missioncomplete') { ctx.fillStyle = state === 'missioncomplete' ? 'yellow' : 'red'; ctx.textAlign = 'center'; ctx.font = 'bold 40px Arial'; ctx.fillText(state === 'missioncomplete' ? "I SALUTE YOU!" : "GAME OVER", 300, 100); ctx.fillStyle = 'white'; ctx.font = '20px Arial'; ctx.fillText(`My score Stage: ${stage} | Score: ${score}`, 300, 150); ctx.fillStyle = '#00ffff'; ctx.font = '22px Arial'; ctx.fillText("LEADERBOARD", 300, 200); if (leaderboards.length === 0) ctx.fillText("No Record", 300, 250); else leaderboards.forEach((e, i) => { ctx.fillText(`${i + 1}. ${e.name} ${e.score} (St ${e.stage})`, 300, 250 + (i * 30)); }); }
    ctx.restore();
}

function generateNextRoom() { return [Math.random() > 0.2, Math.random() > 0.2, Math.random() > 0.2, Math.random() > 0.2].map(x => x || true); }
function updateMazeControls() { document.getElementById('mazeUp').style.visibility = currentExits[0] ? 'visible' : 'hidden'; document.getElementById('mazeRight').style.visibility = currentExits[1] ? 'visible' : 'hidden'; document.getElementById('mazeDown').style.visibility = currentExits[2] ? 'visible' : 'hidden'; document.getElementById('mazeLeft').style.visibility = currentExits[3] ? 'visible' : 'hidden'; }
function makeChoice(idx, dir) { if (!currentExits[idx]) return; stage++; isVoidArea = false; currentWallThickness = 0; isTrapNext = false; portOverheatMultiplier = 1; player.speed = permanentPlayerSpeed; stageEnemyHpMod = 0; stageEnemySpeedMod = 0; silenceUntil = 0; baseEnemySpeedMod += 0.01; let pool = getGachaPool(); let gacha = pool[Math.floor(Math.random() * pool.length)]; gacha.apply(); enemyHpMod = baseEnemyHpMod + stageEnemyHpMod; enemySpeedMod = baseEnemySpeedMod + stageEnemySpeedMod; activeEffectText = gacha.name; effectDisplayTimer = 120; bullets = []; enemyBullets = []; explosions = []; asteroids = []; state = 'playing'; mobileControls.style.display = 'flex'; mazeControls.style.display = 'none'; if(btnPause) btnPause.style.display = 'flex'; spawnEnemies(isTrapNext); saveLastPlayInfo(); if (isVoidArea) pauseBgm(); else playRandomBgm(); }
function saveLastPlayInfo() { try { localStorage.setItem('mazeGalagaLastPlay', JSON.stringify(lastPlayInfo)); } catch(e) {} }
function saveScore() { if (scoreSaved) return; let playerName = window.prompt("Name, please (Max 10word):", "Player"); if (!playerName || playerName.trim() === "") playerName = "Player"; if (playerName.length > 10) playerName = playerName.substring(0, 10); leaderboards.push({ name: playerName, score: score, stage: stage }); leaderboards.sort((a, b) => b.score - a.score); leaderboards = leaderboards.slice(0, 5); try { localStorage.setItem('mazeGalagaLeaderboard', JSON.stringify(leaderboards)); } catch(e) {} scoreSaved = true; }
function isColliding(r1, r2) { return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y; }
function handlePlayerDeath() { if (player.shield > 0) {
    player.shield--;      // 보호막이 1개 이상이면 1개 차감
    hitBlinkTimer = 30;   // 보호막 타격 시 짧은 무적 시간 부여
} else {
    lives--;              // 보호막이 0개면 원래대로 목숨(아머) 차감
    playExplosionSound(); // 피격(폭발) 소리 재생
    hitBlinkTimer = 60;   // 피격 무적 시간
    if (lives <= 0)       // (이 뒤의 사망 처리 기존 코드는 그대로 유지)
 { state = 'gameover'; mobileControls.style.display = 'none'; if(btnPause) btnPause.style.display = 'none'; mazeControls.style.display = 'none'; restartBtn.style.display = 'flex'; saveScore(); } else { player.weaponLevel = Math.max(1, player.weaponLevel - 1); permanentWeaponSpeedLevel = Math.max(0, permanentWeaponSpeedLevel - 1); player.shield = 0; } }
}
function loop() { if (!isPaused) update(); draw(); requestAnimationFrame(loop); }

function handleStartScreen(e) { if (e && e.target && (e.target.closest('#btnSettings') || e.target.closest('#settingsModal') || e.target.closest('#btnPause') || e.target.closest('#btnMusic'))) return; if (state === 'start') { initAudio(); resetGame(); } }
const container = document.getElementById('gameContainer'); container.addEventListener('mousedown', handleStartScreen); container.addEventListener('touchstart', handleStartScreen, {passive: false});
document.getElementById('restartBtn').addEventListener('click', (e) => { e.stopPropagation(); state = 'start'; stopBgm(); restartBtn.style.display = 'none'; score = 0; lives = 3; stage = 1; ctx.clearRect(0, 0, canvas.width, canvas.height); });
function openSettings(e) { e.preventDefault(); e.stopPropagation(); if (state === 'playing') isPaused = true; settingsModal.style.display = 'flex'; }
document.getElementById('btnSettings').addEventListener('mousedown', openSettings); document.getElementById('btnSettings').addEventListener('touchstart', openSettings, {passive: false});
document.getElementById('btnResume').addEventListener('click', () => { isPaused = false; settingsModal.style.display = 'none'; });
document.getElementById('btnExitToTitle').addEventListener('click', () => { isPaused = false; settingsModal.style.display = 'none'; mobileControls.style.display = 'none'; if(btnPause) btnPause.style.display = 'none'; mazeControls.style.display = 'none'; state = 'start'; stopBgm(); score = 0; lives = 3; stage = 1; ctx.clearRect(0, 0, canvas.width, canvas.height); });
// --- 보상형 광고 시스템 ---
let hasPlasmaShield = false; // 플라즈마 보호막 보유 여부

document.getElementById('btnWatchAd').addEventListener('click', (e) => {
    e.stopPropagation();
    
    // 게임 중이라면 일시 정지
    if (state === 'playing') isPaused = true; 
    
    // 1. 광고 모달 띄우기
    const adModal = document.getElementById('adMockModal');
    const adTimerEl = document.getElementById('adTimer');
    adModal.style.display = 'flex';
    
    let timeLeft = 3; // 3초 가짜 대기 시간
    adTimerEl.innerText = timeLeft;
    
    const timer = setInterval(() => {
        timeLeft--;
        adTimerEl.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            adModal.style.display = 'none';
            // 2. 광고가 끝나면 보상 선택 창 띄우기
            document.getElementById('rewardChoiceModal').style.display = 'flex';
        }
    }, 1000);
});

// 보상 1: 플라즈마 보호막 선택
document.getElementById('btnRewardShield').addEventListener('click', (e) => {
    e.stopPropagation();
    hasPlasmaShield = true;
    closeRewardModal("플라즈마 보호막이 활성화되었습니다!");
});

// 보상 2: 아머 +1 선택
document.getElementById('btnRewardArmor').addEventListener('click', (e) => {
    e.stopPropagation();
    lives += 1; // 목숨(아머) 1 증가
    closeRewardModal(`아머가 증가했습니다! (현재 아머: ${lives})`);
});

// 보상 모달 닫고 게임 재개
function closeRewardModal(msg) {
    document.getElementById('rewardChoiceModal').style.display = 'none';
    alert(msg);
    if (state === 'playing') isPaused = false; 
}
loop();
</script>
